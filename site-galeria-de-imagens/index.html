<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="img/escudo.png" class="logo" alt="Palmeiras">
  <h1>SOCIEDADE ESPORTIVA PALMEIRAS</h1>
</header>

<section class="hero">
   <div class="hero-content">
    <h1>O legado do Verdão em um só lugar</h1>
    <p>Títulos, ídolos e momentos históricos</p>

    <p class="hero-sub">
    Desde 1914 fazendo história!
    </p>
</div>
</section>

<section class="row">
    <h2>Títulos recentes</h2>
    <div class="carousel">
        <img src="img/paulista_2026.png" onclick="openModal('Paulistão 2026', this.src)">
        <img src="img/brasileirao_2023.png" onclick="openModal('Brasileirão 2023', this.src)">
        <img src="img/supercopa_2023.png" onclick="openModal('Supercopa 2023', this.src)">
        <img src="img/libertadores_2021.png" onclick="openModal('Libertadores 2021', this.src)">
    </div>
</section>

<section class="row" id="titulos">
    <h2>Ídolos do clube</h2>
    <div class="carousel">
        <img src="img/ademir_da_guia.png" onclick="openModal('Ademir da Guia (Divino)', this.src)">
        <img src="img/marcos.png" onclick="openModal('Marcos (São Marcos)', this.src)">
        <img src="img/dudu.png" onclick="openModal('Dudu', this.src)">
    </div>
</section>

<section class="row">
    <h2>Momentos históricos</h2>
    <div class="carousel">
        <img src="img/corxpal.png" onclick="openModal('Final do Paulistão 1993 - Palmeiras 4 x 0 Corinthians', this.src)">
        <img src="img/flaxpal.png" onclick="openModal('Final da Libertadores 2021 - Flamengo 1 x 2 Palmeiras', this.src)">
        <img src="img/botxpal.png" onclick="openModal('Brasileirão 2023 (Virada Épica - 31ª rodada) - Botafogo 3 x 4 Palmeiras ', this.src)">
    </div>
</section>

<div id="modal" onclick="closeModal()">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <img id="modalImg">
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
