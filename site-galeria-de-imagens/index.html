<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <div class="logo">PALMEIRAS</div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>História do Verdão</h1>
        <p>Títulos, ídolos e momentos que marcaram gerações</p>
    </div>
</section>

<div class="container">

    <section class="row">
        <h2>Títulos Históricos</h2>
        <div class="grid">
            <img src="img/t1.jpg" onclick="openModal(this.src)">
            <img src="img/t2.jpg" onclick="openModal(this.src)">
            <img src="img/t3.jpg" onclick="openModal(this.src)">
        </div>
    </section>

    <section class="row">
        <h2>Craques</h2>
        <div class="grid">
            <img src="img/c1.jpg" onclick="openModal(this.src)">
            <img src="img/c2.jpg" onclick="openModal(this.src)">
            <img src="img/c3.jpg" onclick="openModal(this.src)">
        </div>
    </section>

    <section class="row">
        <h2>Momentos Históricos</h2>
        <div class="grid">
            <img src="img/m1.jpg" onclick="openModal(this.src)">
            <img src="img/m2.jpg" onclick="openModal(this.src)">
            <img src="img/m3.jpg" onclick="openModal(this.src)">
        </div>
    </section>

</div>

<div id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script src="script.js"></script>

</body>
</html>
