<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Galeria do Palmeiras</h1>

    <div class="menu">
        <button onclick="mostrarGaleria('titulos')">Títulos</button>
        <button onclick="mostrarGaleria('craques')">Craques</button>
        <button onclick="mostrarGaleria('momentos')">Momentos</button>
    </div>

    <div id="titulos" class="galeria">
        <h2>Títulos Históricos</h2>

        <img src="img/titulo1.jpg" onclick="ampliar(this)">
        <img src="img/titulo2.jpg" onclick="ampliar(this)">
        <img src="img/titulo3.jpg" onclick="ampliar(this)">
    </div>

    <div id="craques" class="galeria" style="display:none;">
        <h2>Craques Históricos</h2>

        <img src="img/craque1.jpg" onclick="ampliar(this)">
        <img src="img/craque2.jpg" onclick="ampliar(this)">
        <img src="img/craque3.jpg" onclick="ampliar(this)">
    </div>

    <div id="momentos" class="galeria" style="display:none;">
        <h2>Momentos Marcantes</h2>

        <img src="img/momento1.jpg" onclick="ampliar(this)">
        <img src="img/momento2.jpg" onclick="ampliar(this)">
        <img src="img/momento3.jpg" onclick="ampliar(this)">
    </div>

    <div id="modal" onclick="fecharModal()">
        <img id="imgModal">
    </div>

    <script src="script.js"></script>
</body>
</html>
