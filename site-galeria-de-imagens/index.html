<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="img/escudo-palmeiras.png" class="logo" alt="Palmeiras">
  <h1>PALMEIRAS</h1>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>O legado do Verdão em um só lugar</h1>
        <p>Títulos, ídolos e momentos históricos</p>
    </div>
</section>

<section class="row">
    <h2>Títulos recentes</h2>
    <div class="carousel">
        <img src="img/t1.jpg" onclick="openModal('Libertadores 2020', this.src)">
        <img src="img/t2.jpg" onclick="openModal('Brasileirão 2022', this.src)">
        <img src="img/t3.jpg" onclick="openModal('Paulistão', this.src)">
        <img src="img/t4.jpg" onclick="openModal('Recopa', this.src)">
    </div>
</section>

<section class="row">
    <h2>Ídolos do clube</h2>
    <div class="carousel">
        <img src="img/c1.jpg" onclick="openModal('Ídolo histórico', this.src)">
        <img src="img/c2.jpg" onclick="openModal('Craque do time', this.src)">
        <img src="img/c3.jpg" onclick="openModal('Lenda alviverde', this.src)">
    </div>
</section>

<section class="row">
    <h2>Momentos históricos</h2>
    <div class="carousel">
        <img src="img/m1.jpg" onclick="openModal('Final épica', this.src)">
        <img src="img/m2.jpg" onclick="openModal('Virada histórica', this.src)">
        <img src="img/m3.jpg" onclick="openModal('Título inesquecível', this.src)">
    </div>
</section>

<div id="modal" onclick="closeModal()">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <img id="modalImg">
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
