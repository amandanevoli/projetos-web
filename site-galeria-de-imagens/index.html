<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SE Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <h2>Palmeiras+</h2>
</header>

<section class="hero">
    <h1>História do Palmeiras</h1>
    <p>Títulos, craques e momentos históricos do Palmeiras</p>
</section>

<section class="row">
    <h2>Títulos</h2>
    <div class="row-posters">
        <img src="img/t1.jpg" onclick="abrirModal(this)">
        <img src="img/t2.jpg" onclick="abrirModal(this)">
        <img src="img/t3.jpg" onclick="abrirModal(this)">
    </div>
</section>

<section class="row">
    <h2>Craques</h2>
    <div class="row-posters">
        <img src="img/c1.jpg" onclick="abrirModal(this)">
        <img src="img/c2.jpg" onclick="abrirModal(this)">
        <img src="img/c3.jpg" onclick="abrirModal(this)">
    </div>
</section>

<section class="row">
    <h2>Momentos Históricos</h2>
    <div class="row-posters">
        <img src="img/m1.jpg" onclick="abrirModal(this)">
        <img src="img/m2.jpg" onclick="abrirModal(this)">
        <img src="img/m3.jpg" onclick="abrirModal(this)">
    </div>
</section>

<div id="modal" onclick="fecharModal()">
    <img id="modalImg">
</div>

<script src="script.js"></script>

</body>
</html>
