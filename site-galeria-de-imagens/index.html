<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Palmeiras</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <img src="img/escudo.png" class="logo" alt="Palmeiras">
  <h1>SOCIEDADE ESPORTIVA PALMEIRAS</h1>
</header>

<section class="hero">
   <div class="hero-content">
    <h1>O legado do Verdão em um só lugar</h1>
    <p>Títulos, ídolos e momentos históricos</p>

    <p class="hero-sub">
    Desde 1914 fazendo história!
    </p>
</div>
</section>

<section class="row">
    <h2>Títulos recentes</h2>
    <div class="carousel">
        <img src="img/paulista_2026.png" onclick="openModal('Paulistão 2026', this.src)">
        <img src="img/brasileirao_2023.png" onclick="openModal('Brasileirão 2023', this.src)">
        <img src="img/supercopa_2023.png" onclick="openModal('Supercopa 2023', this.src)">
        <img src="img/libertadores_2021.png" onclick="openModal('Libertadores 2021', this.src)">
    </div>
</section>

<section class="row" id="titulos">
    <h2>Ídolos do clube</h2>
    <div class="carousel">
        <img src="img/c1.jpg" onclick="openModal('Ídolo histórico', this.src)">
        <img src="img/c2.jpg" onclick="openModal('Craque do time', this.src)">
        <img src="img/c3.jpg" onclick="openModal('Lenda alviverde', this.src)">
    </div>
</section>

<section class="row">
    <h2>Momentos históricos</h2>
    <div class="carousel">
        <img src="img/m1.jpg" onclick="openModal('Final épica', this.src)">
        <img src="img/m2.jpg" onclick="openModal('Virada histórica', this.src)">
        <img src="img/m3.jpg" onclick="openModal('Título inesquecível', this.src)">
    </div>
</section>

<div id="modal" onclick="closeModal()">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <img id="modalImg">
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
